<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} · {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <input type="checkbox" id="nav-toggle" class="nav-cb" aria-label="Toggle section menu">

  <header class="topbar">
    <label for="nav-toggle" class="menu-btn" aria-hidden="true">
      <span class="menu-icon"></span>
    </label>
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand-mark">SMR</span>
      <span class="brand-name">Location Data API</span>
    </a>
  </header>

  <label for="nav-toggle" class="scrim" aria-hidden="true"></label>

  <aside class="sidebar" id="sidebar">
    <a class="sidebar-brand" href="{{ '/' | relative_url }}">
      <span class="eyebrow">ServiceMaster Restore</span>
      <span class="sidebar-title">Location Data API</span>
    </a>
    <nav class="toc" aria-label="Documentation sections">
      <ol>
        {%- for s in page.sections %}
        <li>
          <a href="#{{ s.id }}">
            <span class="toc-num" aria-hidden="true"></span>
            <span class="toc-label">{{ s.title }}</span>
            {%- if s.tag %}<span class="toc-tag">{{ s.tag }}</span>{%- endif %}
          </a>
        </li>
        {%- endfor %}
      </ol>
    </nav>
    <div class="sidebar-foot"><span class="dot"></span> API v1</div>
  </aside>

  <main class="content" id="main" tabindex="-1">
    <article class="doc">
      <header class="doc-header">
        <p class="eyebrow">API Reference</p>
        <h1>{{ page.title }}</h1>
      </header>
      {{ content }}
    </article>
    <footer class="doc-foot">ServiceMaster Restore Brand - Location Data API</footer>
  </main>

  <script src="{{ '/assets/docs.js' | relative_url }}" defer></script>
</body>
</html>
